<VirtualHost *:80>
  ServerName photoinv.ice-solution.hk

  # Cloudflare Flexible SSL：Cloudflare -> Origin 使用 HTTP，因此不要在這裡強制跳 HTTPS，避免 redirect loop

  # 請把此路徑改成你伺服器上實際 dist 路徑
  DocumentRoot /var/www/photoinv.ice-solution.hk/dist

  ErrorLog  ${APACHE_LOG_DIR}/photoinv.ice-solution.hk_error.log
  CustomLog ${APACHE_LOG_DIR}/photoinv.ice-solution.hk_access.log combined

  <Directory "/var/www/photoinv.ice-solution.hk/dist">
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
  </Directory>

  # React SPA：refresh /pricing 等路由時回 index.html
  <IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} -f [OR]
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} -d
    RewriteRule ^ - [L]
    RewriteRule ^ /index.html [L]
  </IfModule>

  # 靜態資源 cache（可選）
  <IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType text/css "access plus 7 days"
    ExpiresByType application/javascript "access plus 7 days"
    ExpiresByType image/jpeg "access plus 30 days"
    ExpiresByType image/png "access plus 30 days"
    ExpiresByType image/webp "access plus 30 days"
    ExpiresByType image/avif "access plus 30 days"
    ExpiresDefault "access plus 1 hours"
  </IfModule>
</VirtualHost>
